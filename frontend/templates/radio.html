<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Pontiac Radio
    </title>

    <style>

        body {

            margin: 0;
            padding: 0;

            background: #0f0f14;

            color: white;

            font-family: Arial, sans-serif;

            display: flex;

            justify-content: center;

            align-items: center;

            height: 100vh;
        }

        .radio-container {

            width: 500px;

            background: #1a1a24;

            border-radius: 20px;

            padding: 30px;

            box-shadow:
                0 0 25px rgba(0,0,0,0.5);
        }

        h1 {

            text-align: center;

            margin-bottom: 30px;

            color: #00ff88;
        }

        .station-grid {

            display: grid;

            grid-template-columns:
                repeat(2, 1fr);

            gap: 15px;

            margin-bottom: 25px;
        }

        .station-btn {

            padding: 20px;

            border: none;

            border-radius: 15px;

            background: #2b2b38;

            color: white;

            font-size: 18px;

            cursor: pointer;

            transition: 0.3s;
        }

        .station-btn:hover {

            background: #00aa66;
        }

        .controls {

            display: flex;

            justify-content: center;

            gap: 15px;

            margin-top: 20px;
        }

        .control-btn {

            padding:
                12px 25px;

            border: none;

            border-radius: 12px;

            background: #00aa66;

            color: white;

            font-size: 16px;

            cursor: pointer;
        }

        audio {

            width: 100%;

            margin-top: 20px;
        }

        .now-playing {

            text-align: center;

            margin-top: 15px;

            font-size: 18px;

            color: #00ff88;
        }

    </style>

</head>

<body>

    <div class="radio-container">

        <h1>
            Pontiac Radio
        </h1>

        <div class="station-grid">

            <button
                class="station-btn"
                onclick="playStation(
                'https://ice1.somafm.com/groovesalad-128-mp3',
                'Groove Salad'
                )"
            >
                Chill
            </button>

            <button
                class="station-btn"
                onclick="playStation(
                'https://streaming.radio.co/s5c5da6a36/listen',
                'Country'
                )"
            >
                Country
            </button>

            <button
                class="station-btn"
                onclick="playStation(
                'https://stream-uk1.radioparadise.com/aac-320',
                'Radio Paradise'
                )"
            >
                Paradise
            </button>

            <button
                class="station-btn"
                onclick="playStation(
                'https://icecast.radiofrance.fr/fip-midfi.mp3',
                'FIP Jazz'
                )"
            >
                Jazz
            </button>

        </div>

        <div class="controls">

            <button
                class="control-btn"
                onclick="playRadio()"
            >
                ▶ Play
            </button>

            <button
                class="control-btn"
                onclick="pauseRadio()"
            >
                ⏸ Pause
            </button>

        </div>

        <audio
            id="radio-player"
            controls
        >
        </audio>

        <div
            class="now-playing"
            id="now-playing"
        >
            No Station Playing
        </div>

    </div>

    <script>

        const player =
            document.getElementById(
                "radio-player"
            );

        let currentStation = "";

        function playStation(
            url,
            name
        ) {

            currentStation = url;

            player.src = url;

            player.load();

            player.play()
                .then(() => {

                    document.getElementById(
                        "now-playing"
                    ).innerText =
                        "Now Playing: " + name;

                })
                .catch(error => {

                    console.log(
                        error
                    );

                    alert(
                        "Stream failed."
                    );
                });
        }

        function playRadio() {

            if(currentStation !== "") {

                player.play();
            }
        }

        function pauseRadio() {

            player.pause();
        }

    </script>

</body>

</html>
