<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Pontiac Radio
    </title>

    <!-- CSS -->

    <link
        rel="stylesheet"
        href="/static/css/radio.css"
    >

</head>

<body>

    <div class="radio-container">

        <h1>
            Pontiac Radio
        </h1>

        <div class="station-grid">

            <button
                class="station-btn"
                onclick="playStation(
                'https://ice1.somafm.com/groovesalad-128-mp3',
                'Groove Salad'
                )"
            >
                Chill
            </button>

            <button
                class="station-btn"
                onclick="playStation(
                'https://streaming.radio.co/s5c5da6a36/listen',
                'Country'
                )"
            >
                Country
            </button>

            <button
                class="station-btn"
                onclick="playStation(
                'https://stream-uk1.radioparadise.com/aac-320',
                'Radio Paradise'
                )"
            >
                Paradise
            </button>

            <button
                class="station-btn"
                onclick="playStation(
                'https://icecast.radiofrance.fr/fip-midfi.mp3',
                'FIP Jazz'
                )"
            >
                Jazz
            </button>

        </div>

        <div class="controls">

            <button
                class="control-btn"
                onclick="playRadio()"
            >
                ▶ Play
            </button>

            <button
                class="control-btn"
                onclick="pauseRadio()"
            >
                ⏸ Pause
            </button>

        </div>

        <audio
            id="radio-player"
            controls
        >
        </audio>

        <div
            class="now-playing"
            id="now-playing"
        >
            No Station Playing
        </div>

    </div>

    <!-- JS -->

    <script src="/static/java/radio.js"></script>

</body>

</html>
