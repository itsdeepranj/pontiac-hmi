<div id="settings-panel" class="active">

    <h2>

        Settings

    </h2>

    <!-- BRIGHTNESS -->

    <div class="setting-row">

        <label>

            Brightness

        </label>

        <input
            type="range"
            min="20"
            max="100"
            value="100"
            id="brightness-slider"
        >

    </div>

    <!-- VOLUME -->

    <div class="setting-row">

        <label>

            Volume

        </label>

        <input
            type="range"
            min="0"
            max="100"
            value="80"
        >

    </div>

    <!-- WIFI -->

    <div class="setting-row">

        <label>

            WiFi

        </label>

        <button class="dummy-btn">

            Connected

        </button>

    </div>

    <!-- BLUETOOTH -->

    <div class="setting-row">

        <label>

            Bluetooth

        </label>

        <button class="dummy-btn">

            Paired

        </button>

    </div>

</div>
